<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essay Writer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #ffffff;
    --off-white: rgba(255,255,255,0.85);
    --dim-white: rgba(255,255,255,0.5);
    --faint-white: rgba(255,255,255,0.15);
    --border: rgba(255,255,255,0.18);
    --toolbar-bg: transparent; 
    --bottombar-bg: rgba(10, 10, 10, 0.4); /* Added a subtle backdrop color so text stands out clearly */
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Inter', sans-serif;
    color: var(--white);
  }

  /* VIDEO LAYER */
  #video-layer {
    position: fixed; inset: 0; z-index: 0;
    background: #000;
  }
  #yt-iframe {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    display: none;
  }
  #local-video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
  }

  /* OVERLAY PANEL */
  #overlay-panel {
    position: fixed; inset: 0; z-index: 1;
    background: rgba(0,0,0,0.72);
    pointer-events: none;
    transition: background 0.3s;
  }

  /* LANDING */
  #landing {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .landing-title {
    font-family: 'Lora', serif;
    font-size: 2rem; font-weight: 400;
    letter-spacing: 0.04em;
    margin-bottom: 0.3rem;
  }
  .landing-sub {
    font-size: 0.75rem; font-weight: 300;
    color: var(--dim-white);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }
  .landing-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 2rem 2.5rem;
    width: 420px;
    display: flex; flex-direction: column;
    gap: 1.4rem;
  }
  .landing-section { display: flex; flex-direction: column; gap: 0.5rem; }
  .landing-label {
    font-size: 0.68rem; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--dim-white);
  }
  .landing-divider { height: 1px; background: var(--border); }
  .landing-input {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0.55rem 0.8rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem; color: var(--white);
    outline: none; transition: border-color 0.2s;
  }
  .landing-input::placeholder { color: var(--dim-white); }
  .landing-input:focus { border-color: rgba(255,255,255,0.5); }
  .hint-text { font-size: 0.68rem; color: var(--dim-white); }

  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 0.55rem 1rem;
    border-radius: 2px; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    outline: none;
  }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--off-white);
  }
  .btn-ghost:hover { background: var(--faint-white); border-color: rgba(255,255,255,0.4); }
  .btn-solid {
    background: var(--white); border: 1px solid var(--white); color: #000;
  }
  .btn-solid:hover { background: rgba(255,255,255,0.85); }
  .btn-full { width: 100%; }

  /* WORKSPACE */
  #workspace {
    display: none;
    position: fixed; inset: 0; z-index: 10;
    flex-direction: column;
  }
  #workspace.active { display: flex; }

  /* TOOLBAR */
  #toolbar {
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--border);
    padding: 0 0.8rem;
    height: 42px;
    display: flex; align-items: center;
    gap: 0.2rem; flex-shrink: 0;
  }
  .toolbar-group {
    display: flex; align-items: center;
    gap: 0.15rem; padding: 0 0.35rem;
    border-right: 1px solid var(--border);
  }
  .toolbar-group:last-child { border-right: none; }
  .tb-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 2px;
    color: var(--off-white);
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem; font-weight: 500;
    padding: 0.3rem 0.45rem;
    cursor: pointer;
    min-width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s, border-color 0.12s;
  }
  .tb-btn:hover { background: var(--faint-white); border-color: var(--border); }
  .tb-btn.active { background: var(--faint-white); border-color: rgba(255,255,255,0.35); color: var(--white); }
  .tb-select {
    background: transparent; border: 1px solid var(--border);
    border-radius: 2px; color: var(--off-white);
    font-family: 'Inter', sans-serif; font-size: 0.72rem;
    padding: 0.25rem 0.35rem; cursor: pointer; outline: none; height: 26px;
  }
  .tb-select option { background: #1a1a1a; color: #fff; }
  .font-size-input {
    background: transparent; border: 1px solid var(--border);
    border-radius: 2px; color: var(--off-white);
    font-family: 'Inter', sans-serif; font-size: 0.72rem;
    width: 40px; padding: 0.25rem 0.3rem;
    text-align: center; outline: none; height: 26px;
  }

 
  /* EDITOR CONTAINER & TYPEWRITER SCROLLING SPACE */
  #editor-scroll {
    flex: 1; 
    overflow-y: auto;
    min-height: 0; 
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.15) transparent;
  }
  #editor-scroll::-webkit-scrollbar { width: 5px; }
  #editor-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  
  #editor-container { 
    width: 100%; 
    max-width: 720px; 
    margin: 0 auto; /* Handles horizontal centering reliably without flexbox scroll bugs */
    padding-top: 45vh;
    padding-bottom: 50vh; /* Lives on the scrolled child, not the flex/scroll container itself, so it can't fight the flex layout */
    position: relative; 
  }
  
  #editor, #editor *, .ProseMirror, .ProseMirror:focus { 
    background: transparent; 
    outline: none !important; /* Strips away any click/focus outline borders entirely */
    box-shadow: none !important;
  }

  /* FOCUS MODE STYLES */
  .ProseMirror > * {
    opacity: 1; /* Dimmed by default — being "active" is what has to be earned, not the other way around */
    transition: opacity 0.25s ease;
  }
  .ProseMirror > *.focus-active {
    opacity: 1; /* Highlight active line */
  }

  .ProseMirror {
    font-family: 'Lora', serif;
    font-size: 1.05rem; line-height: 1.85;
    color: var(--white);
    caret-color: var(--white);
    min-height: 100px; 
  }

  /* BOTTOM BAR */
  #bottom-bar {
    background: var(--bottombar-bg);
    border-top: 1px solid var(--border);
    height: 48px; padding: 0 1.2rem;
    display: flex; align-items: center;
    gap: 1rem; flex-shrink: 0;
    position: relative;
    z-index: 20; /* Ensures bottom bar explicitly floats cleanly over any document scrolling layers */
  }
  .bb-label {
    font-size: 0.64rem; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--dim-white); white-space: nowrap;
  }
  .bb-group { display: flex; align-items: center; gap: 0.55rem; }
  .bb-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
  .bb-spacer { flex: 1; }
  #opacity-slider {
    -webkit-appearance: none; appearance: none;
    width: 76px; height: 2px;
    background: var(--border); border-radius: 1px;
    outline: none; cursor: pointer;
  }
  #opacity-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--white); cursor: pointer;
  }
  #opacity-slider::-moz-range-thumb {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--white); border: none; cursor: pointer;
  }
  #file-selector {
    background: transparent; border: 1px solid var(--border);
    border-radius: 2px; color: var(--off-white);
    font-family: 'Inter', sans-serif; font-size: 0.72rem;
    padding: 0.2rem 0.5rem; cursor: pointer; outline: none; max-width: 150px;
  }
  #file-selector option { background: #111; color: #fff; }
  
  #word-count {
    font-size: 0.65rem; color: var(--dim-white);
    letter-spacing: 0.06em; white-space: nowrap;
  }

  #save-status {
    font-size: 0.65rem; color: var(--dim-white);
    letter-spacing: 0.06em; min-width: 120px; white-space: nowrap;
  }
  #save-status.saved { color: rgba(140,220,140,0.85); }
  #save-status.unsaved { color: rgba(255,180,80,0.85); }
  #session-timer {
    font-size: 0.65rem; color: var(--dim-white);
    letter-spacing: 0.08em; font-variant-numeric: tabular-nums;
  }
  .bb-icon-btn {
    background: transparent; border: 1px solid var(--border);
    border-radius: 2px; color: var(--off-white);
    width: 28px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 0.75rem;
    transition: background 0.12s; flex-shrink: 0;
  }
  .bb-icon-btn:hover { background: var(--faint-white); }
  
  .yt-update-input {
    background: transparent; border: 1px solid var(--border);
    border-radius: 2px; color: var(--off-white);
    font-family: 'Inter', sans-serif; font-size: 0.72rem;
    padding: 0.25rem 0.5rem; outline: none; width: 120px;
  }
  .yt-update-input::placeholder { color: rgba(255,255,255,0.3); }

  /* MODAL */
  #add-file-modal {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7);
    align-items: center; justify-content: center;
  }
  #add-file-modal.open { display: flex; }
  .modal-card {
    background: rgba(15,15,15,0.98);
    border: 1px solid var(--border); border-radius: 2px;
    padding: 1.8rem 2rem; width: 380px;
    display: flex; flex-direction: column; gap: 1rem;
  }
  .modal-title {
    font-size: 0.8rem; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--off-white);
  }
  .modal-btn-row { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 0.4rem; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 60px; left: 50%;
    transform: translateX(-50%);
    background: rgba(20,20,20,0.95);
    border: 1px solid var(--border); border-radius: 2px;
    padding: 0.5rem 1.1rem; font-size: 0.75rem;
    color: var(--off-white); letter-spacing: 0.04em;
    z-index: 1000; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="video-layer">
  <iframe id="yt-iframe" allow="autoplay; encrypted-media" allowfullscreen frameborder="0"></iframe>
  <video id="local-video" autoplay loop muted playsinline></video>
</div>

<div id="overlay-panel"></div>

<div id="landing">
  <h1 class="landing-title">Essay Writer</h1>
  <p class="landing-sub">Minimalist · Focused · Cinematic</p>
  <div class="landing-card">

    <div class="landing-section">
      <span class="landing-label">Background Video</span>
      <input type="text" id="yt-url-input" class="landing-input" placeholder="YouTube URL">
      <p class="hint-text">— or —</p>
      <input type="file" id="local-video-input" accept="video/*" style="display:none">
      <button class="btn btn-ghost" id="btn-pick-video">Upload local video file</button>
      <span id="local-video-name" class="hint-text"></span>
    </div>

    <div class="landing-divider"></div>

    <div class="landing-section">
      <span class="landing-label">Open Existing Files</span>
      <input type="file" id="open-files-input" accept=".docx" multiple style="display:none">
      <button class="btn btn-ghost" id="btn-open-files">Open Local .docx</button>
      <button class="btn btn-ghost" id="btn-drive-pull">Pull from Google Drive</button>
      <span id="open-files-name" class="hint-text"></span>
    </div>

    <div class="landing-divider"></div>

    <div class="landing-section">
      <span class="landing-label">Start Fresh</span>
      <button class="btn btn-ghost btn-full" id="btn-new-from-landing">Create new document</button>
    </div>

    <button class="btn btn-solid btn-full" id="btn-launch" style="opacity:0.6;margin-top:0.4rem">
      Open Workspace →
    </button>
  </div>
</div>

<div id="workspace">
  <div id="toolbar">
    <div class="toolbar-group">
      <select id="font-family" class="tb-select" title="Font">
        <option value="Lora">Lora</option>
        <option value="Inter">Inter</option>
        <option value="Georgia">Georgia</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
        <option value="Arial">Arial</option>
      </select>
      <input type="number" id="font-size" class="font-size-input" value="17" min="8" max="72" title="Font size">
    </div>
    <div class="toolbar-group">
      <select id="heading-select" class="tb-select" title="Style">
        <option value="0">Paragraph</option>
        <option value="1">Heading 1</option>
        <option value="2">Heading 2</option>
        <option value="3">Heading 3</option>
      </select>
    </div>
    <div class="toolbar-group">
      <button class="tb-btn" id="btn-bold"      title="Bold"><b>B</b></button>
      <button class="tb-btn" id="btn-italic"    title="Italic"><i>I</i></button>
      <button class="tb-btn" id="btn-underline" title="Underline" style="text-decoration:underline">U</button>
      <button class="tb-btn" id="btn-strike"    title="Strikethrough" style="text-decoration:line-through">S</button>
    </div>
    <div class="toolbar-group">
      <button class="tb-btn" id="btn-left"    title="Align left">⇤</button>
      <button class="tb-btn" id="btn-center"  title="Center">⊟</button>
      <button class="tb-btn" id="btn-right"   title="Align right">⇥</button>
      <button class="tb-btn" id="btn-justify" title="Justify">☰</button>
    </div>
    <div class="toolbar-group">
      <button class="tb-btn" id="btn-ul"    title="Bullet list">• —</button>
      <button class="tb-btn" id="btn-ol"    title="Numbered list">1.</button>
      <button class="tb-btn" id="btn-quote" title="Blockquote">" "</button>
    </div>
    <div class="toolbar-group">
      <button class="tb-btn" id="btn-undo" title="Undo">↩</button>
      <button class="tb-btn" id="btn-redo" title="Redo">↪</button>
    </div>
    <div class="toolbar-group">
      <button class="tb-btn" id="btn-add-file">＋ File</button>
    </div>
  </div>

  <div id="editor-scroll">
    <div id="editor-container">
      <div id="editor"></div>
    </div>
  </div>

  <div id="bottom-bar">
    <div class="bb-group">
      <span class="bb-label">Dim</span>
      <input type="range" id="opacity-slider" min="0" max="100" value="72">
    </div>
    <div class="bb-divider"></div>
    
    <div class="bb-group">
      <button class="bb-icon-btn" id="btn-playpause" title="Play/Pause">⏸</button>
      <input type="text" id="workspace-yt-update" class="yt-update-input" placeholder="Change YT URL...">
      <button class="bb-icon-btn" id="btn-update-yt" title="Update Background">↻</button>
    </div>

    <div class="bb-divider"></div>
    <div class="bb-group">
      <span class="bb-label" id="word-count-label">Words</span>
      <span id="word-count">0</span>
    </div>

    <div class="bb-divider"></div>
    <div class="bb-group">
      <span class="bb-label">File</span>
      <select id="file-selector"></select>
    </div>
    <div class="bb-divider"></div>
    <div class="bb-group">
      <button class="btn btn-ghost" id="btn-manual-save" style="height:26px;padding:0 0.7rem;font-size:0.65rem">Save</button>
      <span id="save-status">—</span>
    </div>
    <div class="bb-spacer"></div>
    <div class="bb-group">
      <span class="bb-label">Session</span>
      <span id="session-timer">00:00:00</span>
    </div>
  </div>
</div>

<div id="add-file-modal">
  <div class="modal-card">
    <span class="modal-title">Add Document</span>
    <div style="display:flex;flex-direction:column;gap:0.7rem">
      <input type="text" id="new-file-name" class="landing-input" placeholder="New file name">
      <button class="btn btn-ghost btn-full" id="btn-create-named">Create blank document</button>
      <div class="landing-divider"></div>
      <input type="file" id="modal-open-input" accept=".docx" multiple style="display:none">
      <button class="btn btn-ghost btn-full" id="btn-modal-open-files">Open .docx file(s)</button>
    </div>
    <div class="modal-btn-row">
      <button class="btn btn-ghost" id="btn-close-modal">Cancel</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { Editor }      from 'https://esm.sh/@tiptap/core@2.11.5';
import StarterKit      from 'https://esm.sh/@tiptap/starter-kit@2.11.5';
import Underline       from 'https://esm.sh/@tiptap/extension-underline@2.11.5';
import TextAlign       from 'https://esm.sh/@tiptap/extension-text-align@2.11.5';
import FontFamily      from 'https://esm.sh/@tiptap/extension-font-family@2.11.5';
import { TextStyle }   from 'https://esm.sh/@tiptap/extension-text-style@2.11.5';
import Placeholder     from 'https://esm.sh/@tiptap/extension-placeholder@2.11.5';

const GOOGLE_CLIENT_ID = '282019596677-mp75nk98ce3suc1lp3vaqgavfn6eus34.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly';

const files = {};           
let activeFileId   = null;
let videoPlaying   = true;
let isYT           = false;
let isLocalVideo   = false;
let localVideoBlob = null;
let sessionStart   = null;
let sessionTick    = null;
let pendingFileId  = null;

let tokenClient    = null;
let accessToken    = null;

const editor = new Editor({
  element: document.getElementById('editor'),
  extensions: [
    StarterKit.configure({ history: true }),
    Underline,
    TextStyle,
    FontFamily,
    TextAlign.configure({ types: ['heading', 'paragraph'] }),
    Placeholder.configure({ placeholder: 'Begin writing…' }),
  ],
  content: '',
  editorProps: {
    handleKeyDown: (view, event) => {
      if (event.key === 'Tab') {
        event.preventDefault();
        view.dispatch(view.state.tr.insertText('\t'));
        return true; 
      }
      return false;
    }
  },
  onCreate({ editor }) {
    handleFocusModeAndScroll(editor, true);
  },
  onUpdate({ editor }) { 
    updateWordCount(); 
    markUnsaved(); 
    persistLS(); 
    syncToolbar(); 
    handleFocusModeAndScroll(editor);
  },
  onSelectionUpdate({ editor }) { 
    updateWordCount();
    syncToolbar(); 
    handleFocusModeAndScroll(editor); 
  },
});

// ─── TYPEWRITER SCROLLING & FOCUS ENGINE ──────────
function handleFocusModeAndScroll(tiptapEditor, instant = false) {
  const { view } = tiptapEditor;
  const { state } = view;
  const { selection } = state;

  // 1. Trace up the DOM to find the direct structural block element containing the cursor
  let activeElement = view.domAtPos(selection.anchor).node;
  if (activeElement && activeElement.nodeType === 3) {
      activeElement = activeElement.parentNode;
  }

  // Fallback: If clicking empty space selects the root editor DOM, target the nearest block child
  if (activeElement === view.dom) {
    const childNodes = view.dom.childNodes;
    if (childNodes.length > 0) {
      // Direct focus mode towards the last child block element (common when clicking bottom padding)
      activeElement = childNodes[childNodes.length - 1];
    }
  } else {
    while (activeElement && activeElement.parentNode && activeElement.parentNode !== view.dom) {
        activeElement = activeElement.parentNode;
    }
  }

  // 2. Apply active-line highlight (all other blocks fall back to the dimmed default)
  const allBlocks = view.dom.childNodes;
  allBlocks.forEach(block => {
    if (block.nodeType === 1) {
      block.classList.toggle('focus-active', block === activeElement);
    }
  });

  // 3. Smooth Typewriter Center Line Calculation
  // Uses getBoundingClientRect for both elements so the math is correct regardless of
  // offsetParent chains, padding location, or nested positioned ancestors.
  if (activeElement && activeElement.nodeType === 1) {
    const scrollContainer = document.getElementById('editor-scroll');
    const containerRect = scrollContainer.getBoundingClientRect();
    const elRect = activeElement.getBoundingClientRect();

    const elCenterOffsetFromContainerTop = (elRect.top - containerRect.top) + (elRect.height / 2);
    const targetScrollTop = scrollContainer.scrollTop + elCenterOffsetFromContainerTop - (containerRect.height / 2);

    scrollContainer.scrollTo({
      top: targetScrollTop,
      behavior: instant ? 'auto' : 'smooth'
    });
  }
}

function syncToolbar() {
  const act = (id, cond) => document.getElementById(id)?.classList.toggle('active', !!cond);
  act('btn-bold',      editor.isActive('bold'));
  act('btn-italic',    editor.isActive('italic'));
  act('btn-underline', editor.isActive('underline'));
  act('btn-strike',    editor.isActive('strike'));
  act('btn-left',      editor.isActive({ textAlign: 'left' }));
  act('btn-center',    editor.isActive({ textAlign: 'center' }));
  act('btn-right',     editor.isActive({ textAlign: 'right' }));
  act('btn-justify',   editor.isActive({ textAlign: 'justify' }));
  act('btn-ul',        editor.isActive('bulletList'));
  act('btn-ol',        editor.isActive('orderedList'));

  const hs = document.getElementById('heading-select');
  if (hs) {
    if      (editor.isActive('heading', { level: 1 })) hs.value = '1';
    else if (editor.isActive('heading', { level: 2 })) hs.value = '2';
    else if (editor.isActive('heading', { level: 3 })) hs.value = '3';
    else hs.value = '0';
  }
}

function updateWordCount() {
  const { from, to } = editor.state.selection;
  let text = '';
  const isSelection = from !== to;
  if (isSelection) {
    text = editor.state.doc.textBetween(from, to, ' ');
  } else {
    text = editor.getText();
  }
  const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
  document.getElementById('word-count').textContent = `${words}`;
  const label = document.getElementById('word-count-label');
  if (label) label.textContent = isSelection ? 'Selected' : 'Words';
}

// ─── FILE MANAGEMENT ────────────────────────────────────
function uid() { return '_' + Math.random().toString(36).slice(2, 9); }

function addFileOption(id, name) {
  const sel = document.getElementById('file-selector');
  const opt = document.createElement('option');
  opt.value = id;
  opt.textContent = name.length > 22 ? name.slice(0, 20) + '…' : name;
  sel.appendChild(opt);
}

function createFile(name, content = null, html = null) {
  const id = uid();
  files[id] = { name, content, html, savedAt: null, gdriveId: null };
  addFileOption(id, name);
  return id;
}

function saveCurrentState() {
  if (activeFileId) files[activeFileId].content = editor.getJSON();
}

function switchToFile(id) {
  saveCurrentState();
  activeFileId = id;
  const f = files[id];
  if (f.content)    editor.commands.setContent(f.content);
  else if (f.html)  editor.commands.setContent(f.html);
  else              editor.commands.clearContent();
  document.getElementById('file-selector').value = id;
  updateWordCount();
  setSaveStatus(f.savedAt ? `Last saved ${fmtTime(f.savedAt)}` : 'Not saved yet', f.savedAt ? 'saved' : '');
  handleFocusModeAndScroll(editor, true);
}

document.getElementById('file-selector').addEventListener('change', function() {
  switchToFile(this.value);
});

async function importDocx(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const result = await window.mammoth.convertToHtml({ arrayBuffer: e.target.result });
        resolve({ html: result.value, name: file.name.replace(/\.docx$/i, '') });
      } catch { resolve({ html: '', name: file.name.replace(/\.docx$/i, '') }); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

async function loadFiles(fileList, afterEach) {
  for (const file of fileList) {
    try {
      const { html, name } = await importDocx(file);
      const id = createFile(name, null, html);
      afterEach?.(id);
    } catch { showToast('Could not open: ' + file.name); }
  }
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.async = true; s.defer = true;
    s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

function initGoogleAuth() {
  if (typeof google === 'undefined' || GOOGLE_CLIENT_ID.startsWith('YOUR_')) return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: SCOPES,
    callback: '', 
  });
}

function getDriveAccessToken() {
  return new Promise((resolve, reject) => {
    if (accessToken) return resolve(accessToken);
    if (!tokenClient) return reject(new Error("Drive SDK configs missing."));
    
    tokenClient.callback = (resp) => {
      if (resp.error) reject(resp);
      else {
        accessToken = resp.access_token;
        resolve(accessToken);
      }
    };
    tokenClient.requestAccessToken({ prompt: 'consent' });
  });
}

async function saveDocx(id, isAuto = false) {
  if (!files[id]) return;
  saveCurrentState();
  const f = files[id];
  const { Document, Packer, Paragraph, TextRun, HeadingLevel } = window.docx;
  const content = f.content?.content || [];
  const paras = [];

  for (const node of content) {
    if (node.type === 'heading') {
      const lvl = node.attrs?.level || 1;
      const map = { 1: HeadingLevel.HEADING_1, 2: HeadingLevel.HEADING_2, 3: HeadingLevel.HEADING_3 };
      paras.push(new Paragraph({
        heading: map[lvl] || HeadingLevel.HEADING_1,
        children: [(node.content || []).map(n => new TextRun({ text: n.text || '', bold: true }))].flat(),
      }));
    } else if (node.type === 'paragraph') {
      const runs = (node.content || []).map(n => {
        const marks = n.marks || [];
        return new TextRun({
          text: n.text || '',
          bold:      marks.some(m => m.type === 'bold'),
          italics:   marks.some(m => m.type === 'italic'),
          underline: marks.some(m => m.type === 'underline') ? {} : undefined,
          strike:    marks.some(m => m.type === 'strike'),
        });
      });
      paras.push(new Paragraph({ children: runs.length ? runs : [new TextRun('')] }));
    } else if (node.type === 'bulletList' || node.type === 'orderedList') {
      for (const item of (node.content || [])) {
        const text = (item.content?.[0]?.content || []).map(n => n.text || '').join('');
        paras.push(new Paragraph({ bullet: { level: 0 }, children: [new TextRun(text)] }));
      }
    } else if (node.type === 'blockquote') {
      const text = (node.content?.[0]?.content || []).map(n => n.text || '').join('');
      paras.push(new Paragraph({ children: [new TextRun({ text, italics: true })] }));
    }
  }
  if (!paras.length) paras.push(new Paragraph({ children: [new TextRun('')] }));

  try {
    const blob = await Packer.toBlob(new Document({ sections: [{ properties: {}, children: paras }] }));
    
    if (GOOGLE_CLIENT_ID && !GOOGLE_CLIENT_ID.startsWith('YOUR_')) {
      setSaveStatus('Connecting Drive...', 'unsaved');
      const token = await getDriveAccessToken();
      
      if (!f.gdriveId) {
        const metaResp = await fetch('https://www.googleapis.com/drive/v3/files', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            name: f.name.endsWith('.docx') ? f.name : f.name + '.docx',
            mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
          })
        });
        const metaData = await metaResp.json();
        if (!metaData.id) throw new Error('Could not instantiate Cloud metadata mapping.');
        f.gdriveId = metaData.id;
      }
      
      const uploadResp = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${f.gdriveId}?uploadType=media`, {
        method: 'PATCH',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
        },
        body: blob
      });
      
      if (!uploadResp.ok) throw new Error('Cloud storage handshake rejected write payload.');
      
      f.savedAt = Date.now();
      setSaveStatus((isAuto ? 'Autosaved Drive ' : 'Saved Drive ') + fmtTime(f.savedAt), 'saved');
      if (isAuto) showToast('Autosaved to Google Drive');
    } else {
      const a = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(blob),
        download: f.name.endsWith('.docx') ? f.name : f.name + '.docx',
      });
      a.click();
      URL.revokeObjectURL(a.href);
      f.savedAt = Date.now();
      setSaveStatus((isAuto ? 'Autosaved ' : 'Saved ') + fmtTime(f.savedAt), 'saved');
      if (isAuto) showToast('Autosaved');
    }
  } catch (e) { 
    console.error(e);
    showToast('Save failed: ' + e.message); 
    setSaveStatus('Save Error', 'unsaved');
  }
}

document.getElementById('btn-drive-pull').addEventListener('click', async () => {
  try {
    const token = await getDriveAccessToken();
    showToast('Fetching recent files from Drive...');
    
    const query = "mimeType='application/vnd.openxmlformats-officedocument.wordprocessingml.document'";
    const listResp = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&orderBy=modifiedTime desc&pageSize=5`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    const listData = await listResp.json();
    if (!listData.files || listData.files.length === 0) {
      showToast('No .docx files found in your Google Drive.');
      return;
    }

    for (const gFile of listData.files) {
      const fileResp = await fetch(`https://www.googleapis.com/drive/v3/files/${gFile.id}?alt=media`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const blob = await fileResp.blob();
      const fileObj = new File([blob], gFile.name, { type: blob.type });

      const { html, name } = await importDocx(fileObj);
      const id = createFile(name, null, html);
      files[id].gdriveId = gFile.id; 
      if (!pendingFileId) pendingFileId = id; 
    }

    document.getElementById('btn-launch').style.opacity = '1';
    showToast(`Successfully loaded ${listData.files.length} recent file(s) from Drive`);
  } catch(e) {
    console.error(e);
    showToast('Drive fetch failed: ' + e.message);
  }
});

function fmtTime(ts) {
  const d = new Date(ts);
  return [d.getHours(), d.getMinutes(), d.getSeconds()].map(n => String(n).padStart(2,'0')).join(':');
}
function setSaveStatus(text, cls = '') {
  const el = document.getElementById('save-status');
  el.textContent = text;
  el.className = cls;
}
function markUnsaved() { setSaveStatus('Unsaved changes', 'unsaved'); }

function persistLS() {
  if (!activeFileId) return;
  try {
    localStorage.setItem('ew_' + activeFileId, JSON.stringify({
      name: files[activeFileId].name, content: editor.getJSON(), ts: Date.now(),
    }));
  } catch {}
}

function startSessionTimer() {
  sessionStart = Date.now();
  if (sessionTick) clearInterval(sessionTick);
  sessionTick = setInterval(() => {
    const e = Date.now() - sessionStart;
    const pad = n => String(Math.floor(n)).padStart(2,'0');
    document.getElementById('session-timer').textContent =
      `${pad(e/3600000)}:${pad((e%3600000)/60000)}:${pad((e%60000)/1000)}`;
  }, 1000);
}

function extractYTId(url) {
  for (const p of [/youtu\.be\/([^?&]+)/, /[?&]v=([^&]+)/, /\/embed\/([^?&]+)/, /\/live\/([^?&]+)/, /\/shorts\/([^?&]+)/]) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

function loadYT(url) {
  const id = extractYTId(url);
  if (!id) { showToast('Could not parse YouTube URL'); return false; }
  isYT = true; isLocalVideo = false;
  document.getElementById('local-video').style.display = 'none';
  const iframe = document.getElementById('yt-iframe');
  iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&loop=1&playlist=${id}&controls=0&mute=1&modestbranding=1&enablejsapi=1&playsinline=1`;
  iframe.style.display = 'block';
  sizeYT();
  showToast('Updating background video...');
  return true;
}

function sizeYT() {
  const iframe = document.getElementById('yt-iframe');
  const W = window.innerWidth, H = window.innerHeight, r = 16/9;
  let w = W, h = w/r;
  if (h < H) { h = H; w = h*r; }
  iframe.style.width = w+'px'; iframe.style.height = h+'px';
}

function loadLocalVid(file) {
  isLocalVideo = true; isYT = false;
  document.getElementById('yt-iframe').style.display = 'none';
  const video = document.getElementById('local-video');
  video.src = URL.createObjectURL(file);
  video.style.display = 'block';
  video.play().catch(() => {});
}

window.addEventListener('resize', () => { if (isYT) sizeYT(); });

document.getElementById('opacity-slider').addEventListener('input', function() {
  document.getElementById('overlay-panel').style.background = `rgba(0,0,0,${this.value/100})`;
});

document.getElementById('btn-playpause').addEventListener('click', () => {
  const btn = document.getElementById('btn-playpause');
  if (isYT) {
    const iframe = document.getElementById('yt-iframe');
    iframe.contentWindow.postMessage(
      JSON.stringify({ event: 'command', func: videoPlaying ? 'pauseVideo' : 'playVideo', args: '' }), '*'
    );
  } else if (isLocalVideo) {
    const v = document.getElementById('local-video');
    videoPlaying ? v.pause() : v.play();
  }
  videoPlaying = !videoPlaying;
  btn.textContent = videoPlaying ? '⏸' : '▶';
});

document.getElementById('btn-update-yt').addEventListener('click', () => {
  const url = document.getElementById('workspace-yt-update').value.trim();
  if (url) {
    loadYT(url);
    document.getElementById('workspace-yt-update').value = '';
  }
});

document.getElementById('btn-manual-save').addEventListener('click', () => {
  if (activeFileId) saveDocx(activeFileId, false);
});

document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (activeFileId) saveDocx(activeFileId, false);
  }
});

function showToast(msg, ms = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

document.getElementById('btn-pick-video').addEventListener('click', () => {
  document.getElementById('local-video-input').click();
});
document.getElementById('local-video-input').addEventListener('change', function() {
  if (!this.files[0]) return;
  localVideoBlob = this.files[0];
  document.getElementById('local-video-name').textContent = this.files[0].name;
  document.getElementById('btn-launch').style.opacity = '1';
});

document.getElementById('btn-open-files').addEventListener('click', () => {
  document.getElementById('open-files-input').click();
});
document.getElementById('open-files-input').addEventListener('change', async function() {
  if (!this.files.length) return;
  document.getElementById('open-files-name').textContent =
    Array.from(this.files).map(f => f.name).join(', ');
  let first = null;
  await loadFiles(this.files, id => { if (!first) first = id; });
  if (first) pendingFileId = first;
  document.getElementById('btn-launch').style.opacity = '1';
});

document.getElementById('btn-new-from-landing').addEventListener('click', () => {
  pendingFileId = createFile('Untitled Essay');
  document.getElementById('btn-launch').style.opacity = '1';
  showToast('Ready — click Open Workspace to begin');
});

document.getElementById('btn-launch').addEventListener('click', () => {
  const ytUrl = document.getElementById('yt-url-input').value.trim();
  if (ytUrl) loadYT(ytUrl);
  else if (localVideoBlob) loadLocalVid(localVideoBlob);

  if (!Object.keys(files).length) pendingFileId = createFile('Untitled Essay');

  document.getElementById('landing').style.display = 'none';
  document.getElementById('workspace').classList.add('active');

  switchToFile(pendingFileId || Object.keys(files)[0]);
  startSessionTimer();
  editor.commands.focus();
});

document.getElementById('btn-close-modal').addEventListener('click', () => {
  document.getElementById('add-file-modal').classList.remove('open');
});

document.getElementById('btn-create-named').addEventListener('click', () => {
  const name = document.getElementById('new-file-name').value.trim() || 'Untitled Essay';
  saveCurrentState();
  const id = createFile(name);
  switchToFile(id);
  document.getElementById('add-file-modal').classList.remove('open');
  document.getElementById('new-file-name').value = '';
  showToast(`Created "${name}"`);
});

document.getElementById('btn-modal-open-files').addEventListener('click', () => {
  document.getElementById('modal-open-input').click();
});
document.getElementById('modal-open-input').addEventListener('change', async function() {
  if (!this.files.length) return;
  let first = null;
  await loadFiles(this.files, id => { if (!first) first = id; });
  if (first) { saveCurrentState(); switchToFile(first); }
  document.getElementById('add-file-modal').classList.remove('open');
  showToast(`Opened ${this.files.length} file(s)`);
});

document.getElementById('add-file-modal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

async function bootstrapGoogleServices() {
  try {
    await Promise.all([
      loadScript('https://apis.google.com/js/api.js'),
      loadScript('https://accounts.google.com/gsi/client')
    ]);
    initGoogleAuth();
  } catch(e) {
    console.error("Async background script injection sequence failed.", e);
  }
}
bootstrapGoogleServices();
